name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest -v

      - name: Build distributable artifacts
        run: |
          pip install build
          python -m build

      - name: Verify the wheel installs in a clean environment
        run: |
          python -m venv /tmp/install_test
          /tmp/install_test/bin/pip install dist/med2limit-*.whl
          /tmp/install_test/bin/med2limit --help